spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://issuer.invalid/pi-local

server:
  address: 0.0.0.0

pi:
  i18n:
    default-locale: zh
  security:
    dev-auth:
      enabled: true
  runtime:
    worker:
      id: local-worker
      poll-delay-ms: 250
    run-timeout-ms: 30000
